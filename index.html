        :root { --primary: #1a5d1a; --secondary: #f4bb44; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { background: white; width: 100%; max-width: 850px; margin: 20px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .auth-form { max-width: 400px; margin: 20px auto; display: flex; flex-direction: column; gap: 12px; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        .quiz-header { display: flex; justify-content: space-between; font-weight: bold; color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .question { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 20px; min-height: 50px; line-height: 1.4; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .option { padding: 15px; background: #fff; border: 2px solid #eee; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: center; font-size: 15px; display: flex; align-items: center; justify-content: center; }
        .option:hover { border-color: var(--primary); background: #f0f9f0; transform: translateY(-2px); }
        .leaderboard-section { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .leaderboard { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .leaderboard th, .leaderboard td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .leaderboard th { background: var(--primary); color: white; }
        button { padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #144614; opacity: 0.9; }
        .hidden { display: none; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
    </style>
</head>

    <div id="quiz-container" class="hidden">

        </div>
        <div class="question" id="q-text"></div>
        <div class="options" id="options-box"></div>

        <div class="leaderboard-section">

    function showQuestion() {

        document.getElementById('q-progress').innerText = (currentIdx + 1) + " / " + questions.length;
        document.getElementById('q-text').innerText = q.q;
        
        let btns = "";
        q.a.forEach((opt, i) => {
            btns += `<div class="option" onclick="next(${i})">${opt}</div>`;
        });
        document.getElementById('options-box').innerHTML = btns;
    }

    function next(idx) {
        if(idx === questions[currentIdx].c) score++;
        currentIdx++;
        showQuestion();
    }

        });
    }

        db.sort((a, b) => b.score - a.score);
        let rank = db.findIndex(u => u.name === uName && u.score === score) + 1;
        document.getElementById('final-rank').innerHTML = `Jami savollar: ${questions.length}<br>To'g'ri javoblar: <b>${score}</b><br>Hozirgi reytingingiz: <b>${rank}-o'rin</b>`;
    }
</script>
</body>
</html>
